script: |
            gemini "Я обновил код проекта. Пожалуйста, выполни деплой: 1. Перейди в репозиторий /root/AI-Agent-Optimized-Affiliate-Website и сделай 'git pull origin main'. 2. Запусти 'python3 build.py' для генерации файлов. 3. Создай директорию /var/www/ai-affiliate, если её еще не существует. 4. Скопируй сгенерированный index.html, llms.txt, robots.txt и другие публичные файлы в /var/www/ai-affiliate. 5. Назначь владельцем папки /var/www/ai-affiliate пользователя www-data."
