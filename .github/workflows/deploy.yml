name: Deploy via Gemini AI

on:
  push:
    branches:
      - main # Запуск при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gemini to pull, build, and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            gemini "Я обновил код проекта. Пожалуйста, выполни деплой: 
            1. Перейди в репозиторий /root/AI-Agent-Optimized-Affiliate-Website и сделай 'git pull origin main'. 
            2. Запусти 'python3 build.py' для генерации файлов. 
            3. Создай директорию /var/www/ai-affiliate, если её еще не существует. 
            4. Скопируй сгенерированный index.html, llms.txt, robots.txt и другие публичные файлы в /var/www/ai-affiliate. 
            5. Назначь владельцем папки /var/www/ai-affiliate пользователя www-data (чтобы веб-сервер имел к ней доступ)."
