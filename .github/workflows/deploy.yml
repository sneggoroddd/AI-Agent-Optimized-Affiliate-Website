name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "1. Переход в папку проекта..."
            cd /root/AI-Agent-Optimized-Affiliate-Website || exit
            
            echo "2. Жесткое обновление кода из GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            echo "3. Сборка проекта..."
            python3 build.py
            
            echo "4. Подготовка боевой папки..."
            mkdir -p /var/www/ai-affiliate
            
            echo "5. Копирование файлов..."
            cp index.html llms.txt robots.txt /var/www/ai-affiliate/
            
            echo "6. Настройка прав для Nginx..."
            chown -R www-data:www-data /var/www/ai-affiliate
            
            echo "✅ Деплой успешно завершен!"
