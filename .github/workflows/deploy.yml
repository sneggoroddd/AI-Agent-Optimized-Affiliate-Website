name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Deploy to Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "1. Переход в папку проекта..."
            cd /root/AI-Agent-Optimized-Affiliate-Website || exit
            
            echo "2. Жесткое обновление кода из GitHub..."
            git fetch origin
            git reset --hard origin/main
            
            echo "3. Сборка проекта..."
            python3 build.py
            
            echo "4. Подготовка папки внутри Nginx контейнера..."
            docker exec agent_orange-web-1 mkdir -p /usr/share/nginx/html/ai
            
            echo "5. Копирование файлов в контейнер..."
            docker cp /root/AI-Agent-Optimized-Affiliate-Website/. agent_orange-web-1:/usr/share/nginx/html/ai/
            
            echo "✅ Деплой успешно завершен! Сайт обновлен по адресу agentorange.uk/ai"
