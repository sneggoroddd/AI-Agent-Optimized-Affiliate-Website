name: Deploy via Gemini AI

on:
  push:
    branches:
      - main # Скрипт запустится, когда ты запушишь изменения в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gemini to pull and build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Здесь мы даем текстовую команду Gemini CLI, который уже установлен на сервере.
            # Обязательно замени /path/to/your/folder на реальный путь к папке с проектом!
            
            gemini "Я только что запушил обновления сайта на GitHub. Пожалуйста, выполни следующие шаги: 1. Перейди в папку /path/to/your/folder. 2. Сделай 'git pull origin main', чтобы скачать новый код. 3. Запусти скрипт 'python3 build.py', чтобы пересобрать index.html. 4. Если для веб-сервера нужно скопировать готовый index.html в другую папку (например, /var/www/html/), сделай это. Если будут ошибки при сборке Python — проанализируй их и исправь."
